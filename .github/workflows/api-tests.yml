name: API Tests

on:
  push:
    branches: [ main, master, cinema ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start services with Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 30   # или лучше использовать healthcheck

      - name: Build API test image
        run: |
          docker build -t cinemaabyss-api-tests ./tests/postman

      - name: Run API tests in container
        run: |
          docker run --network=cinemaabyss-network \
            -v "$(pwd)/tests/postman/reports:/app/reports" \
            cinemaabyss-api-tests --environment docker

      - name: Stop services
        if: always()
        run: docker compose down
