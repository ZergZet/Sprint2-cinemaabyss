name: API Tests

on:
  push:
    branches: [ main, master, cinema ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start services with Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 30   # подождать, пока сервисы запустятся

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tests/postman/package-lock.json

      - name: Install Newman
        working-directory: tests/postman
        run: npm install

      - name: Run API tests
        working-directory: tests/postman
        run: |
          npx newman run CinemaAbyss.postman_collection.json \
            --environment docker-env.json \
            --reporters cli,json \
            --reporter-json-export ./reports/newman-report.json

      - name: Stop services
        if: always()
        run: docker compose down
