name: API Tests

on:
  # Триггер после успешного выполнения сборки и пуша образов
  workflow_run:
    workflows: ["Docker Build and Push"]   
    types:
      - completed
    branches:
      - cinema
      - main
      - master

  # Оставляем старые триггеры для запуска тестов отдельно
  push:
    branches: [ main, master, cinema ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    # Условие: запускаем только если workflow завершился успешно (для триггера workflow_run)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Для workflow_run явно указать ref, чтобы взять код из той же ветки, которая запустила сборку. В остальных случаях ref определяется автоматически.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Start services with Docker Compose
        run: |
          docker compose up -d --wait --wait-timeout 60 || true
          echo "=== Logs of monolith ===" 
          docker logs cinemaabyss-monolith
          echo "========================"
          docker compose ps
    
      - name: Build API test image
        run: |
          docker build -t cinemaabyss-api-tests ./tests/postman

      - name: Wait for Kafka and create topics
        run: |
          chmod +x tests/postman/wait-for-kafka.sh
          tests/postman/wait-for-kafka.sh

      - name: Run API tests in container
        run: |
          docker run --rm \
            --network=cinemaabyss-network \
            -v "$(pwd)/tests/postman/reports:/app/reports" \
            cinemaabyss-api-tests --environment docker

      - name: Stop services
        if: always()
        run: docker compose down
